<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1"> <!--maximum-scale=1-->
    <title>Partial Player Plus</title>

    <link rel="stylesheet" href="style.css">  
</head>

<body>

<div class="container">

    <h1>Partial Player Plus</h1>

<div class="control">
    <label for="fundamental">Enter Frequency as Hz</label>

    <div class="spinner">

        <button id="fundMinus">−</button>

        <input
            id="fundamental"
            type="number"
            value="262.81"
            min="0.01"
            step="0.1">

        <button id="fundPlus">+</button>

    </div>
</div>

<div class="control">
    <label for="note">OR as Note (C1 = lowest C on piano)</label>

    <input
        id="note"
        type="text"
        value="C4"
        spellcheck="false"
        autocomplete="off">
</div>

<div class="control">
    <label for="referenceA">Reference A (Hz)</label>

    <div class="spinner">

        <button id="aMinus">−</button>

        <input
            id="referenceA"
            type="number"
            value="442.00"
            min="300"
            max="500"
            step="1">

        <button id="aPlus">+</button>

    </div>
</div>

<div class="control">
    <label for="multiplier">Partial / Overtone</label>

    <div class="spinner">

        <button id="multMinus">−</button>

        <input
            id="multiplier"
            type="number"
            value="3"
            min="-50"
            step="1">

        <button id="multPlus">+</button>

    </div>
</div>
    <div class="output">

        Output Frequency

        <span id="outputFrequency">
            300 Hz
        </span>

    </div>

    <div class="output">

        Nearest Note

        <span id="nearestNote">
        </span>

    </div>

    <div class="control">

        <label for="volume">Volume</label>

        <input
            id="volume"
            type="range"
            min="0"
            max="100"
            value="20">

    </div>

    <div class="buttons">

        <button id="startButton">
            Start
        </button>

        <button id="stopButton">
            Stop
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
